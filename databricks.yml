# This is a Databricks asset bundle definition for dab_my_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dab_my_project
  uuid: 3e6fb856-8729-4892-8db0-922c615125e4

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use
  table_name:
    description: The target Delta table name for JSON ingestion
    default: customers
  source_folder:
    description: The source folder under the Unity Catalog Volume
    default: customers

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405611495879743.3.azuredatabricks.net
    variables:
      catalog: my_databricks_workspace
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://adb-7405611495879743.3.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/sumesh.kashyap90@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/sumesh.kashyap90@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: my_databricks_workspace
      schema: prod
    permissions:
      - user_name: sumesh.kashyap90@gmail.com
        level: CAN_MANAGE
